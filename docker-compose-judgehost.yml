services:
  judgehost-0:
    image: domjudge/judgehost:9.0.0
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup
    privileged: true
    cgroup: host
    hostname: judgehost
    environment:
      - DAEMON_ID=0
    env_file:
      - judgehost.env
  judgehost-1:
    image: domjudge/judgehost:9.0.0
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup
    privileged: true
    cgroup: host
    hostname: judgehost
    environment:
      - DAEMON_ID=1
    env_file:
      - judgehost.env

networks:
  default:
    external:
      name: domjudge-net
