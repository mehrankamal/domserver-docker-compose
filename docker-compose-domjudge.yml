services:
  dj-database:
    image: mariadb:10.11
    restart: always
    ports:
      - "3306:3306"
    volumes:
      - ./db_conf:/etc/mysql/conf.d
      - ./db_data:/var/lib/mysql
    env_file:
      - domserver.env
    command: --max-connections=1000 --max-allowed-packet=512M

  dj-server:
    image: domjudge/domserver:9.0.0
    restart: always
    ports:
      - "8080:80"
    env_file:
      - domserver.env
    links:
      - "dj-database:dj-database"

networks:
  default:
    external:
      name: domjudge-net
